<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <title>VoxMentor Logo</title>
  <desc>VoxMentor — AI Voice Learning Companion logo with white background</desc>

  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- WHITE outer background -->
  <rect width="500" height="500" fill="#ffffff" rx="24"/>

  <!-- Dark circle background — only behind the logo icon -->
  <circle cx="250" cy="210" r="175" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="250" cy="210" r="165" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.25"/>

  <!-- Middle ring -->
  <circle cx="250" cy="210" r="130" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.18"/>

  <!-- Inner filled circle -->
  <circle cx="250" cy="210" r="90" fill="#0e2a5a" stroke="url(#accent)" stroke-width="2"/>

  <!-- Microphone body -->
  <rect x="228" y="170" width="44" height="56" rx="14" fill="none" stroke="url(#accent)" stroke-width="2.5"/>

  <!-- Microphone stand -->
  <line x1="250" y1="226" x2="250" y2="246" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Microphone arc -->
  <path d="M232 236 Q232 256 250 256 Q268 256 268 236" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Base line -->
  <line x1="240" y1="256" x2="260" y2="256" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left wave bars -->
  <line x1="152" y1="192" x2="152" y2="228" stroke="#4f8ef7" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="170" y1="180" x2="170" y2="240" stroke="#5f99f8" stroke-width="3" stroke-linecap="round" opacity="0.60"/>
  <line x1="188" y1="172" x2="188" y2="248" stroke="#7aaaf9" stroke-width="3" stroke-linecap="round" opacity="0.78"/>
  <line x1="206" y1="180" x2="206" y2="240" stroke="#9ab0fb" stroke-width="3" stroke-linecap="round" opacity="0.90"/>

  <!-- Right wave bars -->
  <line x1="294" y1="180" x2="294" y2="240" stroke="#9ab0fb" stroke-width="3" stroke-linecap="round" opacity="0.90"/>
  <line x1="312" y1="172" x2="312" y2="248" stroke="#7aaaf9" stroke-width="3" stroke-linecap="round" opacity="0.78"/>
  <line x1="330" y1="180" x2="330" y2="240" stroke="#5f99f8" stroke-width="3" stroke-linecap="round" opacity="0.60"/>
  <line x1="348" y1="192" x2="348" y2="228" stroke="#4f8ef7" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

  <!-- VoxMentor text — dark color for white bg -->
  <text x="250" y="418" font-family="Arial, sans-serif" font-size="48" font-weight="700" text-anchor="middle" fill="url(#textGrad)" letter-spacing="2">VoxMentor</text>

  <!-- Tagline — dark color for white bg -->
  <text x="250" y="454" font-family="Arial, sans-serif" font-size="12" font-weight="400" text-anchor="middle" fill="#6b7a99" letter-spacing="5">AI VOICE LEARNING COMPANION</text>

  <!-- Decorative lines beside tagline -->
  <line x1="60"  y1="446" x2="145" y2="446" stroke="url(#accent)" stroke-width="0.8" opacity="0.4"/>
  <line x1="355" y1="446" x2="440" y2="446" stroke="url(#accent)" stroke-width="0.8" opacity="0.4"/>

</svg>
